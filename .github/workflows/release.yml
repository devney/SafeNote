name: Build and release SafeNote binaries

on:
  push:
    branches:
      - main

jobs:
  windows-release:
    name: Build Windows exe and publish release
    runs-on: windows-latest

    permissions:
      contents: write  # needed to create releases and upload assets

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and build SafeNote.exe
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install pyinstaller
          .\.venv\Scripts\python.exe .\tools\make_icon.py
          .\.venv\Scripts\python.exe -m PyInstaller --noconsole --name SafeNote --clean --onefile --icon .\assets\SafeNote.ico .\safenote.py

      - name: Create GitHub release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SafeNote build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            dist/SafeNote.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

